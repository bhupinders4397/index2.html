<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-xl font-bold mb-4">AI Chat</h1>
        
        <input type="password" id="apiKey" placeholder="Enter OpenAI API Key" class="w-full p-2 border rounded mb-4">
        
        <div id="chatBox" class="h-96 overflow-y-auto border p-4 mb-4 bg-gray-50 rounded"></div>
        
        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Ask something..." class="flex-1 p-2 border rounded">
            <button onclick="sendMessage()" class="bg-blue-500 text-white px-4 py-2 rounded">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value;
            const userInput = document.getElementById('userInput').value;
            const chatBox = document.getElementById('chatBox');

            if (!apiKey || !userInput) return alert("Please enter API Key and Message");

            chatBox.innerHTML += `<div class="mb-2 text-right"><b>You:</b> ${userInput}</div>`;
            document.getElementById('userInput').value = '';

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "user", content: userInput }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    chatBox.innerHTML += `<div class="mb-2 text-red-500"><b>Error:</b> ${data.error.message}</div>`;
                } else {
                    const reply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="mb-2"><b>AI:</b> ${reply}</div>`;
                }
            } catch (error) {
                chatBox.innerHTML += `<div class="mb-2 text-red-500"><b>Fetch Error:</b> Check Console (F12)</div>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
