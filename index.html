        // Constants
        const DEFAULT_SETTINGS = {
            openaiKey: '',
            deepseekKey: '',
            openrouterKey: '',
            ollamaUrl: 'http://localhost:11434',

        // Icons Helper (Lucide)
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            nameAttr: 'data-lucide',
                            attrs: {
                                class: className,
                                width: size,
                                height: size
                            }
                        });
                    }
                }
            }, [name, size, className]);
            return <i ref={ref} data-lucide={name}></i>;
        };

        // UI Components
        const Button = ({ children, onClick, className = "", variant = "primary", disabled = false, title = "" }) => {
            const variants = {
                primary: "bg-blue-600 hover:bg-blue-500 text-white",
                outline: "border border-gray-700 hover:bg-gray-800 text-gray-300",
                ghost: "text-gray-400 hover:text-white hover:bg-gray-800",
                danger: "text-gray-400 hover:text-red-400"
            };
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    title={title}
                    className={`flex items-center gap-2 p-2 rounded-lg transition-all text-sm disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        // Admin Access
        const ADMIN_PASS = 'bhupi2026';

        // AI Service
        async function chatCompletion(messages, settings) {
            const formattedMessages = messages.map(m => ({
                role: m.role,
                content: m.content
            }));

            if (settings.provider === 'openai' || settings.provider === 'deepseek' || settings.provider === 'openrouter') {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider: settings.provider,
                        messages: formattedMessages,
                        settings: {
                            openaiKey: settings.openaiKey,
                            deepseekKey: settings.deepseekKey,
                            openrouterKey: settings.openrouterKey,
                            selectedModel: settings.selectedModel
                        }
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to get response from AI');
                return data.choices[0].message.content;
            }

            if (settings.provider === 'ollama') {
                try {
                    const response = await fetch(`${settings.ollamaUrl}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: settings.selectedModel || 'llama3',
                            messages: formattedMessages,
                            stream: false
                        })
                    });

                    if (!response.ok) {
                        if (response.status === 404) {
                            throw new Error(`Ollama model "${settings.selectedModel}" not found. Run "ollama pull ${settings.selectedModel}" in your terminal.`);
                        }
                        const errorText = await response.text();
                        throw new Error(`Ollama Error (${response.status}): ${errorText}`);
                    }

                    const data = await response.json();
                    return data.message.content;
                } catch (e) {
                    if (e.message.includes('Failed to fetch')) {
                        throw new Error(`Could not connect to Ollama at ${settings.ollamaUrl}. Make sure Ollama is running locally.`);
                    }
                    throw e;
                }
            }
            throw new Error('Invalid AI provider');
        }

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('deepsense_settings');
                if (saved) {
                    try {
                        return { ...DEFAULT_SETTINGS, ...JSON.parse(saved) };
                    } catch (e) {
                        return DEFAULT_SETTINGS;
                    }
                }
                return DEFAULT_SETTINGS;
            });
            const [showSettings, setShowSettings] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [adminPass, setAdminPass] = useState('');
            const [error, setError] = useState(null);

            const messagesEndRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('deepsense_settings', JSON.stringify(settings));
            }, [settings]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                // Re-initialize lucide icons after message render
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }, [messages, isLoading]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMessage = {
                    id: Date.now().toString(),
                    role: 'user',
                    content: input,
                    timestamp: Date.now(),
                };

                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);
                setError(null);

                try {
                    const response = await chatCompletion([...messages, userMessage], settings);
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: 'assistant',
                        content: response,
                        timestamp: Date.now(),
                    };
                    setMessages(prev => [...prev, assistantMessage]);
                } catch (err) {
                    setError(err.message || 'Something went wrong');
                } finally {
                    setIsLoading(false);
                }
            };

            const unlockAdmin = () => {
                if (adminPass === ADMIN_PASS) {
                    setSettings(prev => ({ ...prev, isAdmin: true }));
                    setAdminPass('');
                } else {
                    alert('Incorrect password');
                }
            };

            const Markdown = ({ content }) => {
                const html = useMemo(() => marked.parse(content), [content]);
                return <div className="prose prose-invert prose-sm max-w-none" dangerouslySetInnerHTML={{ __html: html }} />;
            };

            return (

                            >
                                <div className="p-4 border-b border-gray-800 flex items-center justify-between">

                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-4">

                                        variant="outline"

                                        className="w-full justify-center"
                                    >

                                    <div className="space-y-1">

                                                className="w-full bg-[#0d1117] border border-gray-700 rounded-md p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
                                            >
                                                <option value="openai">OpenAI (GPT)</option>
                                                <option value="deepseek">DeepSeek</option>

                                            </select>
                                        </div>
                                        
                                        <div className="space-y-2 mt-4">

                                            <input

                                                onChange={(e) => setSettings(prev => ({ ...prev, selectedModel: e.target.value }))}
                                                placeholder={
                                                    settings.provider === 'openai' ? 'gpt-4o' : 
                                                    settings.provider === 'deepseek' ? 'deepseek-chat' : 
                                                    settings.provider === 'openrouter' ? 'openai/gpt-3.5-turbo' :
                                                    'llama3'
                                                }
                                                className="w-full bg-[#0d1117] border border-gray-700 rounded-md p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="p-4 border-t border-gray-800 space-y-2">

                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
