<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replit Pro </title>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-black text-white h-screen flex flex-col">

<!-- HEADER -->
<div class="p-3 flex justify-between border-b border-gray-700">
    <h1 class="font-bold">🤖 Replit Pro</h1>

    <input x-model="apiKey" placeholder="OpenRouter API Key"
           class="text-black px-2 py-1 rounded w-64">
</div>

<!-- CHAT -->
<div class="flex-1 overflow-y-auto p-4 space-y-3"
     @dragover.prevent
     @drop="handleDrop($event)">

    <template x-for="(m,i) in messages" :key="i">
        <div class="group relative">

            <div class="text-xs opacity-50" x-text="m.role"></div>

            <div class="p-3 bg-gray-800 rounded relative">

                <span x-text="m.content"></span>

                <template x-if="m.image">
                    <img :src="m.image" class="mt-2 max-w-xs rounded">
                </template>

                <!-- COPY BUTTON -->
                <button 
                    @click="copyText(m.content)"
                    class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 bg-gray-700 text-xs px-2 py-1 rounded">
                    📋
                </button>

            </div>
        </div>
    </template>

</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 items-center">

    <button @click="toggleVoice()">🎤</button>

    <input x-model="input" @keydown.enter="send()"
           class="flex-1 text-black px-3 py-2 rounded">

    <button @click="send()">➡️</button>

</div>

<!-- FOOTER -->
<footer class="py-3 border-t border-gray-700 flex justify-center items-center">
    <p class="text-sm text-gray-400">
        Powered by <span class="text-white font-semibold">Bhupendra Saini</span>
    </p>
</footer>

<!-- TOAST -->
<div x-show="toast" class="fixed bottom-5 right-5 bg-green-600 px-4 py-2 rounded">
    <span x-text="toast"></span>
</div>

<script>
function app() {
return {

apiKey: '',
messages: [],
input: '',
toast: '',
listening: false,
recognition: null,

init() {
    const saved = localStorage.getItem('chat');
    if (saved) this.messages = JSON.parse(saved);
},

limit() {
    if (this.messages.length > 20) {
        this.messages = this.messages.slice(-20);
    }
},

async send() {

    if (!this.input.trim()) return;

    const text = this.input;

    this.messages.push({ role: 'user', content: text });
    this.limit();
    this.input = '';

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + this.apiKey,
                "Content-Type": "application/json",
                "HTTP-Referer": window.location.href,
                "X-Title": "Replit Pro"
            },
            body: JSON.stringify({
                model: "openai/gpt-4o-mini",
                messages: this.messages.slice(-20).map(m => ({
                    role: m.role,
                    content: m.content
                }))
            })
        });

        const data = await res.json();

        const reply = data.choices[0].message.content;

        this.messages.push({ role: 'assistant', content: reply });
        this.limit();

        this.speak(reply);

    } catch (e) {
        this.messages.push({ role: 'assistant', content: "Error: " + e.message });
    }

    this.save();
},

copyText(text) {
    navigator.clipboard.writeText(text);
    this.toast = "Copied!";
    setTimeout(() => this.toast = '', 1500);
},

toggleVoice() {
    if (!('webkitSpeechRecognition' in window)) return;

    if (this.listening) {
        this.recognition.stop();
        this.listening = false;
        return;
    }

    this.recognition = new webkitSpeechRecognition();
    this.recognition.onresult = e => {
        this.input += e.results[0][0].transcript;
    };

    this.recognition.start();
    this.listening = true;
},

speak(text) {
    const s = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(s);
},

save() {
    localStorage.setItem('chat', JSON.stringify(this.messages));
}

}
}
</script>

</body>
</html>
